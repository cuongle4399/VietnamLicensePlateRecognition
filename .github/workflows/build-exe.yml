name: Build & Release Windows Application

on:
  push:
    tags:
      - 'v*'           # Trigger chỉ khi push tag dạng v1.0, v1.2.3 ...
  workflow_dispatch:   # Cho phép chạy thủ công từ GitHub UI

permissions:
  contents: write      # Bắt buộc để tạo Release và upload assets

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build App with PyInstaller
      run: |
        pyinstaller --noconfirm --clean --name "VN_License_Plate_OCR" `
          --add-data "templates;templates" `
          --add-data "static;static" `
          --add-data "weights;weights" `
          --add-data "yolov8n.pt;." `
          --collect-all ultralytics `
          --collect-all paddleocr `
          --collect-all paddlex `
          --collect-all paddle `
          main.py

    - name: Zip the build output
      run: |
        Compress-Archive -Path dist\VN_License_Plate_OCR -DestinationPath VN_License_Plate_OCR_Windows.zip

    - name: Determine Release Tag
      id: tag
      shell: bash
      run: |
        if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
          echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        else
          echo "tag=dev-build-$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT
        fi

    - name: Create GitHub Release & Upload ZIP
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.tag.outputs.tag }}
        name: "VN License Plate OCR — ${{ steps.tag.outputs.tag }}"
        body: |
          ## 🚀 Phiên bản ${{ steps.tag.outputs.tag }}

          Tải xuống và giải nén file ZIP bên dưới. Chạy file `VN_License_Plate_OCR.exe` để khởi động ứng dụng.

          **Yêu cầu:** Windows 10/11 64-bit. Không cần cài Python.
        files: VN_License_Plate_OCR_Windows.zip
        draft: false
        prerelease: false
