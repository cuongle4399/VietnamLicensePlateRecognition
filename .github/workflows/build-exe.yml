name: Build & Release Windows Application

on:
  push:
    branches: [ main ]   # Tự động release mỗi lần push lên main
  workflow_dispatch:     # Cho phép chạy thủ công từ GitHub UI

permissions:
  contents: write        # Bắt buộc để tạo Release và upload assets

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build App with PyInstaller
      run: |
        pyinstaller --noconfirm --clean --name "VN_License_Plate_OCR" `
          --add-data "templates;templates" `
          --add-data "static;static" `
          --add-data "weights;weights" `
          --add-data "yolov8n.pt;." `
          --collect-all ultralytics `
          --collect-all paddleocr `
          --collect-all paddlex `
          --collect-all paddle `
          main.py

    - name: Zip the build output
      run: |
        Compress-Archive -Path dist\VN_License_Plate_OCR -DestinationPath VN_License_Plate_OCR_Windows.zip

    - name: Generate release tag from commit SHA
      id: tag
      shell: bash
      run: |
        SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
        echo "tag=build-${SHORT_SHA}" >> $GITHUB_OUTPUT
        echo "name=Auto Build — $(date +'%Y-%m-%d') (${SHORT_SHA})" >> $GITHUB_OUTPUT

    - name: Create GitHub Release & Upload ZIP
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.tag.outputs.tag }}
        name: ${{ steps.tag.outputs.name }}
        body: |
          Tải xuống và giải nén file ZIP bên dưới. Chạy `VN_License_Plate_OCR.exe` để khởi động.

          **Yêu cầu:** Windows 10/11 64-bit. Không cần cài Python.
        files: VN_License_Plate_OCR_Windows.zip
        draft: false
        prerelease: false
